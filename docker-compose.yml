services:
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongoquest
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro,Z
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "admin",
          "-p",
          "mongoquest",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://admin:mongoquest@mongo:27017
      COURSEPACK_DIR: /app/coursepacks
      NODE_ENV: production
    volumes:
      - ./coursepacks:/app/coursepacks:ro,Z
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
